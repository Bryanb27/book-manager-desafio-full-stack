services:

  postgres:
    image: postgres:17

    container_name: bookmanager-postgres

    environment:
      POSTGRES_DB: bookmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: bookmanager-backend

    ports:
      - "8081:8081"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}

    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend

    container_name: bookmanager-frontend

    ports:
      - "3000:3000"

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8081

    depends_on:
      - backend

volumes:
  postgres_data: