services:

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: bookmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/bookmanager
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    depends_on:
      - postgres